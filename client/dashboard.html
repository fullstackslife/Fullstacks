<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>My Properties | FullStacks.ink</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .client-shell {
        min-height: 100vh;
        background: var(--color-bg, #0a0a0a);
        color: var(--color-text, #f0f0f0);
      }
      .client-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.9rem 1.5rem;
        border-bottom: 1px solid var(--color-border, #2a2a2a);
        background: var(--color-surface, #141414);
      }
      .client-nav .brand {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        text-decoration: none;
        color: inherit;
      }
      .client-nav .brand-mark {
        background: var(--color-accent, #e8b86d);
        color: #000;
        font-weight: 800;
        font-size: 0.85rem;
        width: 2rem;
        height: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 5px;
        flex-shrink: 0;
      }
      .client-nav .nav-right {
        display: flex;
        align-items: center;
        gap: 1rem;
        font-size: 0.875rem;
      }
      .client-nav .greeting {
        color: var(--color-muted, #888);
      }
      .client-nav button.logout-btn {
        background: none;
        border: 1px solid var(--color-border, #2a2a2a);
        color: var(--color-muted, #888);
        font-size: 0.8rem;
        padding: 0.3rem 0.75rem;
        border-radius: 5px;
        cursor: pointer;
      }
      .client-nav button.logout-btn:hover {
        border-color: #555;
        color: #ccc;
      }
      .client-content {
        max-width: 860px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem;
      }
      .page-heading {
        margin-bottom: 2rem;
      }
      .page-heading h1 {
        font-size: 1.6rem;
        margin: 0 0 0.25rem;
      }
      .page-heading p {
        color: var(--color-muted, #888);
        font-size: 0.9rem;
        margin: 0;
      }
      .section-heading {
        font-size: 1.05rem;
        margin: 2rem 0 1rem;
        color: var(--color-text, #f0f0f0);
      }
      .card-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .portal-card {
        background: var(--color-surface, #141414);
        border: 1px solid var(--color-border, #2a2a2a);
        border-radius: 10px;
        padding: 1.25rem 1.5rem;
      }
      .portal-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
      }
      .portal-card h2 {
        font-size: 1.05rem;
        margin: 0 0 0.2rem;
      }
      .portal-card .location {
        font-size: 0.85rem;
        color: var(--color-muted, #888);
        margin: 0;
      }
      .status-badge {
        display: inline-block;
        padding: 0.25rem 0.7rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
        flex-shrink: 0;
        background: #2a2a3a;
        color: #9b9bcc;
      }
      .status-badge.tone-active { background: #1a3a2a; color: #4db884; }
      .status-badge.tone-warm   { background: #3a2f1a; color: #d4a843; }
      .status-badge.tone-muted  { background: #2a2a2a; color: #888; }
      .portal-meta {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
        font-size: 0.82rem;
        color: var(--color-muted, #888);
        border-top: 1px solid var(--color-border, #2a2a2a);
        padding-top: 0.75rem;
        margin-top: 0.75rem;
      }
      .portal-meta span strong {
        color: var(--color-text, #f0f0f0);
        font-weight: 600;
      }
      .portal-message {
        margin-top: 0.75rem;
        font-size: 0.875rem;
        color: var(--color-muted, #aaa);
        font-style: italic;
        border-left: 2px solid var(--color-border, #2a2a2a);
        padding-left: 0.75rem;
      }
      .consultant-list {
        margin-top: 0.75rem;
        border-top: 1px solid var(--color-border, #2a2a2a);
        padding-top: 0.75rem;
      }
      .consultant-list h3 {
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--color-muted, #888);
        margin: 0 0 0.5rem;
      }
      .consultant-list ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .consultant-list li {
        font-size: 0.875rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .consultant-list li .role {
        color: var(--color-muted, #888);
      }
      .empty-state {
        text-align: center;
        padding: 3rem 2rem;
        color: var(--color-muted, #888);
        background: var(--color-surface, #141414);
        border: 1px solid var(--color-border, #2a2a2a);
        border-radius: 10px;
      }
      .empty-state h2 {
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
        color: var(--color-text, #f0f0f0);
      }
      #loading-state {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--color-muted, #888);
      }
    </style>
  </head>
  <body>
    <div class="client-shell" id="app" hidden>
      <nav class="client-nav">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">FS</span>
          <span><strong>FullStacks.ink</strong></span>
        </a>
        <div class="nav-right">
          <span class="greeting" id="nav-greeting"></span>
          <button class="logout-btn" id="logout-btn">Sign out</button>
        </div>
      </nav>

      <div class="client-content">
        <div class="page-heading">
          <h1>My Properties</h1>
          <p id="property-count"></p>
        </div>

        <div id="loading-state">Loading…</div>

        <div id="dashboard-body" hidden>
          <h2 class="section-heading">Your Inquiry</h2>
          <div class="card-list" id="inquiry-card"></div>

          <h2 class="section-heading">Your Properties</h2>
          <div class="card-list" id="property-list" hidden></div>
          <div class="empty-state" id="empty-state" hidden>
            <h2>No properties yet</h2>
            <p>You'll see your property here once the team sets up your property profile.</p>
          </div>
        </div>
      </div>
    </div>

    <script src="/assets/client-dashboard.js" defer></script>
  </body>
</html>
