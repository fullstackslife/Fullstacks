<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Repair Needs | FullStacks.ink</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=admin-20260613" />
    <script src="/assets/admin-property-repairs.js?v=admin-20260613" defer></script>
  </head>
  <body class="admin-page">
    <header class="site-header" id="admin-site-header" hidden>
      <nav class="nav" aria-label="Admin navigation">
        <a class="brand" href="/admin" aria-label="FullStacks.ink Admin home">
          <span class="brand-mark" aria-hidden="true">FS</span>
          <span>
            <strong>FullStacks.ink</strong>
            <small>Repair Needs</small>
          </span>
        </a>
        <div class="nav-links">
          <a href="/admin">Admin Home</a>
          <a href="/admin/clients">Clients</a>
          <a href="/admin/consultants">Consultants</a>
          <a href="/admin/properties">Properties</a>
          <a href="/admin/property">Property</a>
          <a href="/admin/property/rooms">Rooms</a>
          <a href="/admin/property/repairs" aria-current="page">Repairs</a>
          <a href="/">Public Site</a>
        </div>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="admin-hero" aria-labelledby="admin-title">
        <p class="section-kicker">Property Recovery</p>
        <h1 id="admin-title">Repair Needs</h1>
        <p>Checklist items marked Needs Repair, grouped by room for prioritizing corrective work.</p>
      </section>

      <section class="inquiry-form admin-access" id="admin-access-panel" aria-labelledby="access-title">
        <div class="form-heading">
          <p class="section-kicker">Protected Access</p>
          <h2 id="access-title">Enter the admin access token.</h2>
        </div>
        <form id="admin-token-form">
          <div class="form-grid">
            <label class="full-span">
              <span>Admin Access Token</span>
              <input id="admin-token" name="token" type="password" autocomplete="current-password" required />
            </label>
          </div>
          <div class="form-footer">
            <p class="form-status" id="admin-token-status" role="status" aria-live="polite"></p>
            <button class="button primary" type="submit">View Report</button>
          </div>
        </form>
      </section>

      <section class="admin-dashboard" id="admin-dashboard" hidden>
        <div class="admin-toolbar" id="repairs-toolbar">
          <button class="button secondary" id="toggle-filters-btn" type="button" aria-expanded="false" aria-controls="repair-filters">Filters</button>
          <button class="button secondary" id="admin-refresh" type="button">Refresh</button>
        </div>

        <form class="admin-filters" id="repair-filters">
          <label>
            <span>Floor</span>
            <select name="floor">
              <option value="">All floors</option>
              <option value="1">Floor 1</option>
              <option value="2">Floor 2</option>
              <option value="3">Floor 3</option>
            </select>
          </label>
          <label>
            <span>Room Status</span>
            <select name="room_status">
              <option value="">All statuses</option>
              <option>In Service</option>
              <option>OOO</option>
              <option>Maintenance</option>
              <option>Renovation</option>
              <option>Mothballed</option>
            </select>
          </label>
          <label>
            <span>Checklist Group</span>
            <select name="group" id="group-filter">
              <option value="">All groups</option>
            </select>
          </label>
          <label class="admin-search">
            <span>Search</span>
            <input name="q" type="search" maxlength="120" placeholder="Room, item, notes, OOS reason" />
          </label>
          <div class="admin-filter-actions">
            <button class="button secondary" type="reset">Clear</button>
            <button class="button primary" type="submit">Apply</button>
          </div>
        </form>

        <div class="admin-summary">
          <p class="form-status" id="admin-load-status" role="status" aria-live="polite"></p>
        </div>

        <section class="repairs-report" id="repairs-report" aria-label="Repair needs by room"></section>
      </section>
    </main>
  </body>
</html>
