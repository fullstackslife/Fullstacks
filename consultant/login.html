<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Consultant Login | FullStacks.ink</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .consultant-login-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        background: var(--color-bg, #0a0a0a);
      }
      .login-card {
        background: var(--color-surface, #141414);
        border: 1px solid var(--color-border, #2a2a2a);
        border-radius: 12px;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 400px;
      }
      .login-card .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 2rem;
        text-decoration: none;
        color: inherit;
      }
      .login-card .brand-mark {
        background: var(--color-accent, #e8b86d);
        color: #000;
        font-weight: 800;
        font-size: 1rem;
        width: 2.25rem;
        height: 2.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        flex-shrink: 0;
      }
      .login-card h1 {
        font-size: 1.4rem;
        margin: 0 0 0.25rem;
      }
      .login-card p.subtitle {
        font-size: 0.875rem;
        color: var(--color-muted, #888);
        margin: 0 0 2rem;
      }
      .login-card .form-group {
        margin-bottom: 1.25rem;
      }
      .login-card label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--color-muted, #888);
        margin-bottom: 0.4rem;
      }
      .login-card input {
        width: 100%;
        padding: 0.65rem 0.85rem;
        background: var(--color-input-bg, #1c1c1c);
        border: 1px solid var(--color-border, #2a2a2a);
        border-radius: 6px;
        color: inherit;
        font-size: 0.95rem;
        box-sizing: border-box;
      }
      .login-card input:focus {
        outline: none;
        border-color: var(--color-accent, #e8b86d);
      }
      .login-card .error {
        color: #e05c5c;
        font-size: 0.85rem;
        margin-top: 0.5rem;
        min-height: 1.2em;
      }
      .login-card button {
        width: 100%;
        padding: 0.75rem;
        background: var(--color-accent, #e8b86d);
        color: #000;
        font-weight: 700;
        font-size: 0.95rem;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 0.5rem;
      }
      .login-card button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="consultant-login-wrap">
      <div class="login-card">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">FS</span>
          <span>
            <strong>FullStacks.ink</strong>
          </span>
        </a>
        <h1>Consultant Portal</h1>
        <p class="subtitle">Sign in to view your assignments.</p>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <p class="error" id="login-error" role="alert" aria-live="polite"></p>
          <button type="submit" id="login-btn">Sign In</button>
        </form>
      </div>
    </div>

    <script>
      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("login-btn");
        const error = document.getElementById("login-error");
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        error.textContent = "";
        btn.disabled = true;
        btn.textContent = "Signing in…";

        try {
          const res = await fetch("/api/consultant/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (data.ok) {
            window.location.href = "/consultant/dashboard";
          } else {
            error.textContent = data.error || "Login failed.";
            btn.disabled = false;
            btn.textContent = "Sign In";
          }
        } catch {
          error.textContent = "Network error. Please try again.";
          btn.disabled = false;
          btn.textContent = "Sign In";
        }
      });
    </script>
  </body>
</html>
